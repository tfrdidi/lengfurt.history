<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lengfurt-History</title>
  <meta name="description" content="Eine visuelle Zeitreise in die Geschichte von Lengfurt." />
  <meta property="og:title" content="Lengfurt-History" />
  <meta property="og:description" content="Eine visuelle Zeitreise in die Geschichte von Lengfurt." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="bilder/header.jpg" />
  <meta property="og:image:type" content="image/jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="518" />
  <meta property="og:image:secure_url" content="https://lengfurt-history.app/bilder/header.jpg" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main class="page">
    <header class="hero">
      <h1>Lengfurt-History</h1>
      <p>Eine visuelle Zeitreise in die Geschichte von Lengfurt.</p>
    </header>

    <section class="gallery" data-gallery aria-live="polite"></section>

    <section class="map-section" aria-labelledby="karte-titel">
      <div class="compare-card">
        <div class="compare-content">
            <h2 id="karte-titel">Karte mit den Aufnahmepunkten</h2>
            <p>
              Hier sind die Standorte dokumentiert, von wo aus die Fotos aufgenommen wurden.
            </p>
        </div>
          <div class="map-embed">
            <iframe src="https://www.google.com/maps/d/embed?mid=1ggDm_IBhAO5Al_2fngC7RQu9NAcwdJE&ehbc=2E312F"
              width="640" height="480" loading="lazy" referrerpolicy="no-referrer-when-downgrade"
              title="Google My Maps Karte"></iframe>
          </div>
      </div>
    </section>

      <p class="footer-note">
        Hier kommen in Zukunft noch ein paar Fotos dazu.
      </p>
  </main>

  <div class="pop-up" id="info-pop-up" role="dialog" aria-modal="true" aria-labelledby="pop-up-title" hidden>
    <div class="pop-up-content">
      <div class="pop-up-header">
        <h2 class="pop-up-title" id="pop-up-title"></h2>
        <button class="pop-up-close" type="button" aria-label="Popup schließen">×</button>
      </div>
      <p class="pop-up-text"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
